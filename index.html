<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>BInsight Connect — Portal do Cliente</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Firebase Auth só aceita localhost (não 127.0.0.1) nos authorized domains -->
    <script>
      (function () {
        var h = location.hostname;
        if (h === '127.0.0.1' || h === '0.0.0.0') {
          location.replace(
            location.protocol +
              '//localhost' +
              (location.port ? ':' + location.port : '') +
              location.pathname +
              location.search +
              location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
